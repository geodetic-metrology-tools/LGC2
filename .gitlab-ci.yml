include: "https://gitlab.cern.ch/apc/susofts/shared/sus_ci_cppworker/raw/master/.gitlab-ci-TEMPLATE.yml"

##################
# LINUX BUILDS   #
##################

# Build all targets and run the tests
linux_build_and_test:
    script:
        - echo "Building all targets | -j$(nproc)"
        - $CMAKEBIN --build . -j $(nproc) --config Release
        - echo "Running the tests"
        - cd LGC_Tests && ./LGC_Tests

# Build and upload the LGC application
linux_release:
    script:
        - echo "Building executable | -j$(nproc)"
        - $CMAKEBIN --build . -j $(nproc) --config Release --target LGC
        - cp LGC ..
    artifacts:
        paths:
            - LGC

##################
# WINDOWS BUILDS #
##################

# Build all targets and run the tests
windows64_build_and_test:
    script:
        - echo "Building all targets"
        - cmake --build . -j %NUMBER_OF_PROCESSORS% --config Release
        - cmake --build . -j %NUMBER_OF_PROCESSORS% --config Release --target PACKAGE
        - echo "Running the tests"
        - cd LGC_Tests && cp Release/LGC_Tests.exe . && LGC_Tests.exe

# Build and upload the LGC application
windows64_release:
    script:
        - echo "Building executable"
        - cmake --build . -j %NUMBER_OF_PROCESSORS% --config Release --target PACKAGE
        - cp LGCInstaller-*.exe ..
    artifacts:
        paths:
            - LGCInstaller-*.exe

# Build all targets and run the tests
windows32_build_and_test:
    extends: windows64_build_and_test
    tags:
        - windows
        - x32
    variables:
        CMAKEGENERATOR: "Visual Studio 15 2017"

# Build and upload the LGC application
windows32_release:
    extends: windows64_release
    tags:
        - windows
        - x32
    variables:
        CMAKEGENERATOR: "Visual Studio 15 2017"
    artifacts:
        name: win32installer
