include:
  - project: 'apc/common/gitlab-ci-utils'
    file: 'ci/scripts/gitlab-ci-susoft.yml'

##################
# LINUX BUILDS   #
##################

# Build all targets and run the tests
linux_build_and_test:
  extends: .linux_build_and_test

# Build and upload the LGC application
linux_release:
  extends: .linux_release
  needs: ["linux_build_and_test"]
  script:
    - !reference [.default_linux_before_scripts, script]
    - echo "Building executable | -j$(nproc)"
    - $CMAKEBIN --build . -j $(nproc) --config Release --target LGC
  artifacts:
    paths:
      - LGC
    expire_in: 1 week


##################
# WINDOWS BUILDS #
##################

# Build all targets and run the tests
windows64_build_and_test:
  extends: .windows64_build_and_test

# Build and upload the LGC application
windows64_release:
  extends: .windows64_release
  needs: ["windows64_build_and_test"]
  script:
    - !reference [.default_windows_before_scripts, script]
    - echo "Building executable"
    - cmake --build . -j $env:NUMBER_OF_PROCESSORS --config Release --target PACKAGE
    - cp LGCInstaller-*.exe ..
  artifacts:
    paths:
      - LGCInstaller-*.exe

##################
# SBOM GENERATION #
##################

stages:
  - build
  - test
  - release
  - sbom

generate_sbom:
  stage: sbom
  image: alpine:3.18
  needs:
    - job: linux_release
      artifacts: true
      optional: true
    - job: windows64_release
      artifacts: true
      optional: true
  script:
    - apk add --no-cache curl bash
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - echo "Generating SBOM for Linux binary..."
    - if [ -f LGC ]; then syft file:LGC -o cyclonedx-json > sbom-linux.json; else syft dir:. -o cyclonedx-json > sbom-linux.json; fi
    - echo "Generating SBOM for Windows installer..."
    - if ls LGCInstaller-*.exe 1> /dev/null 2>&1; then syft file:LGCInstaller-*.exe -o cyclonedx-json > sbom-windows.json; else syft dir:. -o cyclonedx-json > sbom-windows.json; fi
  artifacts:
    paths:
      - sbom-linux.json
      - sbom-windows.json
    expire_in: 1 week

