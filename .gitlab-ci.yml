include:
  - project: 'apc/common/gitlab-ci-utils'
    file: 'ci/scripts/gitlab-ci-susoft.yml'

##################
# LINUX BUILDS   #
##################

# Build all targets and run the tests
linux_build_and_test:
  extends: .linux_build_and_test

# Build and upload the LGC application
linux_release:
  extends: .linux_release
  needs: ["linux_build_and_test"]
  script:
    - !reference [.default_linux_before_scripts, script]
    - echo "Building executable | -j$(nproc)"
    - $CMAKEBIN --build . -j $(nproc) --config Release --target LGC
    - cp LGC ..
  artifacts:
    paths:
      - LGC

##################
# WINDOWS BUILDS #
##################

# Build all targets and run the tests
windows64_build_and_test:
  extends: .windows64_build_and_test

# Build and upload the LGC application
windows64_release:
  extends: .windows64_release
  needs: ["windows64_build_and_test"]
  script:
    - !reference [.default_windows_before_scripts, script]
    - echo "Building executable"
    - cmake --build . -j $env:NUMBER_OF_PROCESSORS --config Release --target PACKAGE
    - cp LGCInstaller-*.exe ..
  artifacts:
    paths:
      - LGCInstaller-*.exe

##################
# SBOM GENERATION #
##################

stages:
  - build
  - sbom
  - test
  - release

generate_sbom_linux:
  stage: sbom
  image: alpine:latest
  needs: ["linux_release"]
  script:
    - apk add --no-cache curl bash
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - echo "Generating SBOM for Linux binary..."
    - syft file:../LGC -o cyclonedx-json > sbom-linux.json || syft dir:. -o cyclonedx-json > sbom-linux.json
  artifacts:
    paths:
      - sbom-linux.json
    expire_in: 1 week

generate_sbom_windows:
  stage: sbom
  image: alpine:latest
  needs: ["windows64_release"]
  script:
    - apk add --no-cache curl bash
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - echo "Generating SBOM for Windows installer..."
    - syft file:../LGCInstaller-*.exe -o cyclonedx-json > sbom-windows.json || syft dir:. -o cyclonedx-json > sbom-windows.json
  artifacts:
    paths:
      - sbom-windows.json
    expire_in: 1 week
