# Pre-commit hooks for LGC2
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3

repos:
  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent large files from being committed
      - id: check-added-large-files
        args: ['--maxkb=1000']
      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict
      # Check for merge conflicts
      - id: check-merge-conflict
      # Check YAML syntax
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags used in GitLab CI
      # Check JSON syntax
      - id: check-json
      # Check for files that don't end in a newline
      - id: end-of-file-fixer
        exclude: '\.txt$'  # Exclude test output files
      # Remove trailing whitespace
      - id: trailing-whitespace
        exclude: '\.txt$'  # Exclude test output files
      # Ensure files use LF line endings
      - id: mixed-line-ending
        args: ['--fix=lf']
      # Check for debugging statements
      - id: debug-statements
        exclude: '\.cpp$|\.h$'  # C++ files don't have Python debug statements

  # CMake formatting (optional - uncomment if you want to enforce CMake formatting)
  # - repo: https://github.com/cheshirekow/cmake-format-precommit
  #   rev: v0.6.13
  #   hooks:
  #     - id: cmake-format
  #       additional_dependencies: [pyyaml]
  #     - id: cmake-lint
  #       additional_dependencies: [pyyaml]

  # Check for common C++ issues and project requirements
  - repo: local
    hooks:
      # Check REUSE compliance for committed files only
      - id: reuse-committed-files
        name: Check REUSE compliance (committed files only)
        entry: bash
        language: system
        pass_filenames: true
        args:
          - -c
          - |
            # Check if reuse command is available, install if not
            if ! command -v reuse &> /dev/null; then
              echo "REUSE tool not found. Installing..."
              pip install "reuse[charset-normalizer]"
              if [ $? -ne 0 ]; then
                echo "Error: Failed to install reuse tool"
                exit 1
              fi
            fi

            # Check each committed file individually
            echo "Checking REUSE compliance for committed files..."
            FAILED=0
            for file in "$@"; do
              if ! reuse lint-file "$file" > /dev/null 2>&1; then
                echo "REUSE compliance check failed for: $file"
                reuse lint-file "$file"
                FAILED=1
              fi
            done

            if [ $FAILED -eq 0 ]; then
              echo "All committed files are REUSE compliant"
            else
              exit 1
            fi
          - --

      # Format C++ code with clang-format using local .clang-format configuration
      - id: clang-format
        name: clang-format
        entry: clang-format
        language: system
        types_or: [c++, c]
        args: ['-i', '--style=file']  # Edit in-place, use .clang-format file

      # Check that text files are UTF-8 encoded
      - id: check-utf8-encoding
        name: Check UTF-8 encoding
        entry: python3
        language: system
        files: '\.(cpp|h|hpp|c|md|cmake|sh|yml|yaml|json)$'
        exclude: 'test_files/.*\.txt$'  # Exclude test output files
        args:
          - -c
          - |
            import sys
            for filepath in sys.argv[1:]:
                try:
                    with open(filepath, 'rb') as f:
                        f.read().decode('utf-8')
                except UnicodeDecodeError:
                    print(f"ERROR: {filepath} is not valid UTF-8")
                    sys.exit(1)

      # Check for Signed-off-by in commit message (recommended, required for MR)
      - id: check-signoff
        name: Check for Signed-off-by line (recommended)
        entry: bash
        language: system
        stages: [commit-msg]
        always_run: true
        args:
          - -c
          - |
            if ! grep -q "^Signed-off-by:" "$1"; then
              echo ""
              echo "Warning: Commit message does not include a Signed-off-by line."
              echo ""
              echo "This is not required for development commits, but ALL commits"
              echo "must be signed-off before creating a merge request."
              echo ""
              echo "To sign this commit: git commit -s"
              echo "To sign later: git commit --amend -s --no-edit"
              echo ""
              echo "To skip this check: git commit --no-verify"
              echo ""
              exit 1
            fi
          - --

      # Check for TODO/FIXME comments (informational only - won't fail)
      - id: check-todos
        name: Check for TODO/FIXME comments
        entry: bash -c 'git diff --cached --name-only --diff-filter=ACM | grep -E "\.(cpp|h|hpp|c)$" | xargs -r grep -nH "TODO\|FIXME" || true'
        language: system
        pass_filenames: false
        verbose: true

      # Prevent commits to master/appwidevs branches
      - id: prevent-direct-master-commit
        name: Prevent direct commits to master/appwidevs
        entry: bash -c 'BRANCH=$(git rev-parse --abbrev-ref HEAD); if [[ "$BRANCH" == "master" || "$BRANCH" == "appwidevs" ]]; then echo "Direct commits to $BRANCH are not allowed. Please create a feature branch."; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

# Configuration
fail_fast: false  # Run all hooks even if one fails
